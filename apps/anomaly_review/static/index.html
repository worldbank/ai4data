<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anomaly Explanation Reviewer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      [data-theme="dark"] {
        --bg: #0f1419;
        --surface: #1a2332;
        --surface-hover: #243044;
        --text: #e6edf3;
        --text-muted: #8b949e;
        --accent: #58a6ff;
        --accent-dim: #388bfd33;
        --success: #3fb950;
        --warning: #d29922;
        --danger: #f85149;
        --border: #30363d;
        --chart-grid: rgba(48, 54, 61, 0.5);
        --anomaly-band: rgba(248, 81, 73, 0.15);
        --line-color: rgb(88, 166, 255);
        --line-fill: rgba(88, 166, 255, 0.15);
      }

      [data-theme="light"] {
        --bg: #ffffff;
        --surface: #f6f8fa;
        --surface-hover: #eaeef2;
        --text: #1f2328;
        --text-muted: #656d76;
        --accent: #0969da;
        --accent-dim: #0969da22;
        --success: #1a7f37;
        --warning: #9a6700;
        --danger: #cf222e;
        --border: #d0d7de;
        --chart-grid: rgba(31, 35, 40, 0.12);
        --anomaly-band: rgba(207, 34, 46, 0.12);
        --line-color: rgb(9, 105, 218);
        --line-fill: rgba(9, 105, 218, 0.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        overflow: hidden;
        height: 100%;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 1.5rem;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      body {
        font-family: "DM Sans", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }

      .header {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--border);
      }

      .header h1 {
        font-size: 1.25rem;
        font-weight: 600;
      }

      .theme-toggle {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 0.75rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.875rem;
        color: var(--text);
        transition: background 0.15s ease;
      }

      .theme-toggle:hover {
        background: var(--surface-hover);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }

      .app {
        margin-top: 0.5rem;
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 1.5rem;
        overflow: hidden;
      }

      .sidebar {
        background: var(--surface);
        border-radius: 8px;
        border: 1px solid var(--border);
        padding: 1rem;
        overflow-y: auto;
        overflow-x: hidden;
        min-height: 0;
      }

      .sidebar h2 {
        font-size: 0.75rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .item-card {
        padding: 0.75rem 1rem;
        margin-bottom: 0.5rem;
        background: var(--bg);
        border-radius: 8px;
        border: 1px solid transparent;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .item-card:hover {
        background: var(--surface-hover);
        border-color: var(--border);
      }

      .item-card.active {
        border-color: var(--accent);
        background: var(--accent-dim);
      }

      .item-card .indicator {
        font-weight: 600;
        font-size: 0.9rem;
      }
      .item-card .geo {
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      .item-card .window {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.75rem;
        color: var(--accent);
        margin-top: 0.25rem;
      }
      .item-card .classification {
        font-size: 0.75rem;
        margin-top: 0.25rem;
      }

      .badge-reviewed {
        color: var(--success);
        font-size: 0.75rem;
        margin-left: 0.25rem;
      }

      .main {
        display: flex;
        flex-direction: column;
        gap: 0;
        min-height: 0;
        overflow: hidden;
        flex: 1;
      }

      .main-split {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        overflow: hidden;
        --chart-pane-height: 400px;
      }

      .chart-container {
        background: var(--surface);
        border-radius: 8px;
        border: 1px solid var(--border);
        padding: 1rem 1.5rem;
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        height: var(--chart-pane-height);
        min-height: 140px;
        overflow: hidden;
      }

      .chart-container h3 {
        font-size: 1rem;
        flex-shrink: 0;
        color: var(--text-muted);
      }

      .chart-wrapper {
        flex: 1;
        min-height: 0;
        position: relative;
      }

      .chart-wrapper canvas {
        display: block;
      }

      .chart-legend {
        flex-shrink: 0;
        display: flex;
        gap: 1rem;
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      .chart-legend span {
        display: flex;
        align-items: center;
        gap: 0.35rem;
      }

      .chart-legend .swatch {
        width: 12px;
        height: 12px;
        border-radius: 2px;
      }

      .chart-legend .swatch-anomaly {
        background: var(--anomaly-band);
        border: 1px solid var(--danger);
      }
      .chart-legend .swatch-line {
        background: var(--line-color);
      }
      .chart-legend .swatch-imputed {
        background: transparent;
        border: 2px solid var(--text-muted);
        border-radius: 50%;
      }

      .split-resizer {
        flex: 0 0 8px;
        margin: 4px 0;
        background: var(--border);
        cursor: row-resize;
        position: relative;
        touch-action: none;
        user-select: none;
        border-radius: 4px;
        transition: background 0.15s ease;
      }
      .split-resizer:hover,
      .split-resizer.is-dragging {
        background: var(--accent);
      }
      .split-resizer::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 32px;
        height: 3px;
        border-radius: 2px;
        background: var(--surface-hover);
        opacity: 0.9;
      }

      .explanation-panel {
        background: var(--surface);
        border-radius: 8px;
        border: 1px solid var(--border);
        padding: 1.5rem;
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
      }

      .explanation-panel h3 {
        font-size: 1rem;
        margin-bottom: 0.75rem;
        color: var(--text-muted);
      }

      .explanation-tabs {
        display: flex;
        gap: 0.25rem;
        margin-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }

      .explanation-tabs .tab-btn {
        padding: 0.5rem 1rem;
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        cursor: pointer;
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-bottom: -1px;
        font-family: inherit;
        transition: color 0.15s, border-color 0.15s;
      }

      .explanation-tabs .tab-btn:hover {
        color: var(--text);
      }

      .explanation-tabs .tab-btn.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
        font-weight: 500;
      }

      .tab-panel {
        display: none;
        font-size: 0.95rem;
        line-height: 1.7;
      }

      .tab-panel.active {
        display: block;
      }

      .summary-agree {
        color: var(--success);
        font-weight: 500;
        margin-bottom: 0.75rem;
      }

      .summary-disagree {
        color: var(--warning);
        font-weight: 500;
        margin-bottom: 0.75rem;
      }

      .summary-compare {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }

      .summary-compare .explainer-row {
        display: flex;
        align-items: flex-start;
        gap: 0.5rem;
        padding: 0.5rem;
        background: var(--bg);
        border-radius: 6px;
        font-size: 0.9rem;
      }

      .summary-compare .explainer-row .name {
        font-weight: 600;
        min-width: 5rem;
      }

      .evidence-list {
        margin-top: 0.75rem;
        padding-left: 1.25rem;
        font-size: 0.9rem;
        color: var(--text-muted);
      }

      .evidence-list li { margin-bottom: 0.25rem; }

      .explanation-text {
        font-size: 0.95rem;
        margin-bottom: 1rem;
        line-height: 1.7;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem 1.5rem;
        font-size: 0.85rem;
      }

      .meta span {
        padding: 0.25rem 0.5rem;
        background: var(--bg);
        border-radius: 4px;
        font-family: "JetBrains Mono", monospace;
      }

      .badge {
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-weight: 500;
      }

      [data-theme="dark"] .badge.classification-external-driver {
        background: #23863633;
        color: #3fb950;
      }
      [data-theme="dark"] .badge.classification-data-error {
        background: #da363333;
        color: #f85149;
      }
      [data-theme="dark"] .badge.classification-measurement-system-update {
        background: #d2992233;
        color: #d29922;
      }
      [data-theme="dark"] .badge.classification-insufficient-data {
        background: #6e768133;
        color: #8b949e;
      }
      [data-theme="dark"] .badge.classification-modeling-artifact {
        background: #8957e533;
        color: #a371f7;
      }

      [data-theme="light"] .badge.classification-external-driver {
        background: #1a7f3722;
        color: #1a7f37;
      }
      [data-theme="light"] .badge.classification-data-error {
        background: #cf222e22;
        color: #cf222e;
      }
      [data-theme="light"] .badge.classification-measurement-system-update {
        background: #9a670022;
        color: #9a6700;
      }
      [data-theme="light"] .badge.classification-insufficient-data {
        background: #656d7622;
        color: #656d76;
      }
      [data-theme="light"] .badge.classification-modeling-artifact {
        background: #8250df22;
        color: #8250df;
      }

      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--border);
        min-width: 0;
      }

      .filter-bar input,
      .filter-bar select {
        padding: 0.4rem 0.6rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 0.85rem;
        font-family: inherit;
        min-width: 0;
        max-width: 100%;
      }

      .filter-bar input:focus,
      .filter-bar select:focus {
        outline: none;
        border-color: var(--accent);
      }

      .filter-bar input[type="search"] {
        flex: 1 1 120px;
        min-width: 80px;
      }

      .filter-bar select {
        flex: 1 1 90px;
        max-width: 150px;
      }

      .filter-bar input[type="number"] {
        width: 4rem;
        flex: 0 0 auto;
      }

      .filter-bar .btn-clear {
        padding: 0.4rem 0.6rem;
        font-size: 0.85rem;
        background: var(--surface-hover);
        border: 1px solid var(--border);
        color: var(--text-muted);
        border-radius: 6px;
        cursor: pointer;
      }

      .filter-bar .btn-clear:hover {
        color: var(--text);
        background: var(--surface);
      }

      .results-count {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-bottom: 0.5rem;
      }

      .empty-state {
        text-align: center;
        padding: 4rem 2rem;
        color: var(--text-muted);
      }

      .empty-state p {
        margin-top: 0.5rem;
      }

      .feedback-section {
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
      }
      .feedback-section h4 {
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
        color: var(--text-muted);
      }
      .feedback-buttons {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }
      .btn {
        padding: 0.4rem 0.8rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 500;
        font-size: 0.85rem;
      }
      .btn-approve {
        background: #238636;
        color: white;
      }
      .btn-reject {
        background: #da3633;
        color: white;
      }
      .btn-review {
        background: var(--surface-hover);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-active {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      textarea {
        width: 100%;
        padding: 0.5rem;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-family: inherit;
        margin-top: 0.5rem;
        resize: vertical;
      }
      #feedback-status {
        font-size: 0.85rem;
        color: var(--success);
        margin-top: 0.5rem;
      }

      .facet-controls-wrap {
        margin-bottom: 0.75rem;
      }
      .facet-hint {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-bottom: 0.5rem;
        line-height: 1.45;
      }
      .facet-table-scroll {
        overflow-x: auto;
        margin-bottom: 0.5rem;
      }
      .facet-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.82rem;
      }
      .facet-table th,
      .facet-table td {
        border: 1px solid var(--border);
        padding: 0.35rem 0.5rem;
        text-align: left;
        vertical-align: middle;
      }
      .facet-table thead th {
        background: var(--bg);
        font-weight: 600;
      }
      .facet-table tbody th[scope="row"] {
        font-weight: 500;
        color: var(--text-muted);
        white-space: nowrap;
      }
      .facet-table select.facet-select {
        width: 100%;
        min-width: 7.5rem;
        max-width: 14rem;
        padding: 0.25rem 0.35rem;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-family: inherit;
        font-size: 0.82rem;
      }
      .facet-col-head.facet-col-active,
      .facet-cell.facet-col-active {
        background: var(--accent-dim);
      }
      .feedback-meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem 1.25rem;
        margin-top: 0.5rem;
        margin-bottom: 0.5rem;
        align-items: flex-end;
      }
      .feedback-meta-row label {
        font-size: 0.82rem;
        color: var(--text-muted);
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }
      .feedback-meta-row select {
        padding: 0.3rem 0.45rem;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-family: inherit;
        font-size: 0.85rem;
        min-width: 10rem;
      }
      .best-explainer-wrap.is-hidden {
        display: none;
      }
      .suggested-classification-label {
        display: block;
        font-size: 0.82rem;
        color: var(--text-muted);
        margin-top: 0.35rem;
        margin-bottom: 0.25rem;
      }
      .feedback-input-text {
        width: 100%;
        padding: 0.45rem 0.5rem;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-family: inherit;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Anomaly Explanation Reviewer</h1>
        <button
          class="theme-toggle"
          id="theme-toggle"
          aria-label="Toggle dark/light mode"
          title="Toggle dark/light mode"
        >
          <svg
            id="theme-icon-sun"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            style="display: none"
          >
            <circle cx="12" cy="12" r="5" />
            <path
              d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
            />
          </svg>
          <svg
            id="theme-icon-moon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          <span id="theme-label">Dark</span>
        </button>
      </div>

      <div class="app">
        <aside class="sidebar">
          <h2>Anomalies</h2>
          <div class="filter-bar">
            <input
              type="search"
              id="filter-search"
              placeholder="Search indicator..."
              aria-label="Search indicator name"
            />
            <select id="filter-indicator" aria-label="Filter by indicator">
              <option value="">All indicators</option>
            </select>
            <select id="filter-geography" aria-label="Filter by geography">
              <option value="">All geographies</option>
            </select>
            <input
              type="number"
              id="filter-year-min"
              placeholder="From"
              aria-label="Year from"
              min="1900"
              max="2100"
            />
            <input
              type="number"
              id="filter-year-max"
              placeholder="To"
              aria-label="Year to"
              min="1900"
              max="2100"
            />
            <select id="filter-classification" aria-label="Filter by classification">
              <option value="">All classifications</option>
            </select>
            <button type="button" class="btn-clear" id="filter-clear">
              Clear
            </button>
          </div>
          <div class="results-count" id="results-count"></div>
          <div id="item-list"></div>
        </aside>
        <main class="main">
          <div class="main-split" id="main-split">
            <div class="chart-container" id="chart-pane">
              <h3 id="chart-title">Timeseries</h3>
              <div class="chart-wrapper">
                <canvas id="chart"></canvas>
              </div>
              <div class="chart-legend" id="chart-legend">
                <span><span class="swatch swatch-line"></span> Value</span>
                <span
                  ><span class="swatch swatch-anomaly"></span> Anomaly
                  window</span
                >
                <span><span class="swatch swatch-imputed"></span> Imputed</span>
              </div>
            </div>
            <div
              class="split-resizer"
              id="split-resizer"
              role="separator"
              aria-orientation="horizontal"
              aria-label="Drag to resize chart and explanation panels"
              tabindex="0"
            ></div>
            <div class="explanation-panel">
            <h3>Explanation</h3>
            <div id="explanation-content"></div>
            <div class="feedback-section" id="feedback-section">
              <h4>Feedback</h4>
              <div class="facet-controls-wrap" id="facet-controls-wrap">
                <p class="facet-hint" id="facet-hint">
                  Optional: rate each facet per model. Use the overall buttons below as
                  the QA gate (whether this item is acceptable to ship), not as a single
                  score for every dimension.
                </p>
                <div class="facet-table-scroll">
                  <div id="facet-table"></div>
                </div>
                <div class="feedback-meta-row">
                  <label>
                    Reference explainer
                    <select id="reference-explainer" aria-label="Reference explainer"></select>
                  </label>
                  <div class="best-explainer-wrap is-hidden" id="best-explainer-wrap">
                    <label>
                      Best overall (if models disagree)
                      <select id="best-explainer" aria-label="Best explainer"></select>
                    </label>
                  </div>
                </div>
              </div>
              <div class="feedback-buttons">
                <button
                  class="btn btn-approve"
                  data-verdict="approved"
                  onclick="submitVerdict('approved')"
                >
                  Approve
                </button>
                <button
                  class="btn btn-reject"
                  data-verdict="rejected"
                  onclick="submitVerdict('rejected')"
                >
                  Reject
                </button>
                <button
                  class="btn btn-review"
                  data-verdict="needs_review"
                  onclick="submitVerdict('needs_review')"
                >
                  Needs Review
                </button>
              </div>
              <label class="suggested-classification-label" for="feedback-suggested-classification">
                Suggested classification (if incorrect)
              </label>
              <input
                type="text"
                id="feedback-suggested-classification"
                class="feedback-input-text"
                placeholder="When classification is wrong, enter the correct label…"
                autocomplete="off"
              />
              <textarea
                id="feedback-comment"
                placeholder="Optional comment..."
                rows="2"
              ></textarea>
              <div id="feedback-status"></div>
            </div>
          </div>
          </div>
        </main>
      </div>
    </div>

    <script>
      // Theme toggle
      const THEME_KEY = "anomaly-reviewer-theme";
      const prefersDark = window.matchMedia(
        "(prefers-color-scheme: dark)",
      ).matches;

      function initTheme() {
        const saved = localStorage.getItem(THEME_KEY);
        const theme = saved || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
        updateThemeUI(theme);
      }

      function updateThemeUI(theme) {
        const sun = document.getElementById("theme-icon-sun");
        const moon = document.getElementById("theme-icon-moon");
        const label = document.getElementById("theme-label");
        if (theme === "dark") {
          sun.style.display = "none";
          moon.style.display = "block";
          label.textContent = "Light";
        } else {
          sun.style.display = "block";
          moon.style.display = "none";
          label.textContent = "Dark";
        }
      }

      document.getElementById("theme-toggle").addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-theme");
        const next = current === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem(THEME_KEY, next);
        updateThemeUI(next);
        if (chart) updateChartColors();
      });

      initTheme();

      let chart = null;
      let items = [];
      let filteredItems = [];
      let selectedId = null;
      let currentChartConfig = null;
      let feedbackKeys = new Set();
      let facetExplainerNames = [];

      const FACET_DEFS = [
        { key: "anomaly_validity", label: "Anomaly validity" },
        { key: "classification", label: "Classification" },
        { key: "explanation", label: "Explanation" },
        { key: "evidence", label: "Evidence" },
      ];
      const RATING_OPTIONS = [
        { value: "", label: "—" },
        { value: "correct", label: "Correct" },
        { value: "partially_correct", label: "Partially correct" },
        { value: "incorrect", label: "Incorrect" },
        { value: "not_applicable", label: "N/A" },
        { value: "unsure", label: "Unsure" },
      ];

      function escapeAttr(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;");
      }

      function getExplainerNames(it) {
        const ex = it.explanation || {};
        const expl = ex.explainers || [];
        if (expl.length) {
          return expl.map((e) => (e.name && String(e.name).trim()) || "Unnamed");
        }
        const label = (ex.source || ex.name || "Model").trim() || "default";
        return [label];
      }

      function buildFacetTable(it) {
        const names = getExplainerNames(it);
        facetExplainerNames = names;
        const tableEl = document.getElementById("facet-table");
        const thead = `<tr><th scope="col">Facet</th>${names
          .map(
            (n) =>
              `<th scope="col" class="facet-col-head" data-explainer="${escapeAttr(n)}">${escapeHtml(n)}</th>`,
          )
          .join("")}</tr>`;
        const tbody = FACET_DEFS.map((fd) => {
          const cells = names
            .map((n) => {
              const opts = RATING_OPTIONS.map(
                (o) =>
                  `<option value="${escapeAttr(o.value)}">${escapeHtml(o.label)}</option>`,
              ).join("");
              return `<td class="facet-cell" data-explainer="${escapeAttr(n)}"><select class="facet-select" data-facet="${fd.key}" data-explainer="${escapeAttr(n)}">${opts}</select></td>`;
            })
            .join("");
          return `<tr><th scope="row">${escapeHtml(fd.label)}</th>${cells}</tr>`;
        }).join("");
        tableEl.innerHTML = `<table class="facet-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;

        const ref = document.getElementById("reference-explainer");
        const bestWrap = document.getElementById("best-explainer-wrap");
        const best = document.getElementById("best-explainer");
        ref.innerHTML = names
          .map((n) => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`)
          .join("");
        if (names.length) ref.selectedIndex = 0;

        best.innerHTML =
          '<option value="">—</option>' +
          names.map((n) => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join("");
        bestWrap.classList.toggle("is-hidden", names.length <= 1);
      }

      function setActiveExplainerForFacets(nameOrNull) {
        document.querySelectorAll(".facet-col-head, .facet-cell").forEach((el) => {
          const ex = el.getAttribute("data-explainer");
          const match = Boolean(nameOrNull) && ex === nameOrNull;
          el.classList.toggle("facet-col-active", match);
        });
      }

      function collectFacetsFromDOM() {
        const facets = {};
        document.querySelectorAll(".facet-select").forEach((sel) => {
          const f = sel.dataset.facet;
          const ex = sel.dataset.explainer;
          const v = (sel.value || "").trim();
          if (!v || !f || !ex) return;
          if (!facets[f]) facets[f] = {};
          facets[f][ex] = v;
        });
        return Object.keys(facets).length ? facets : null;
      }

      function ensureOption(selectEl, value) {
        if (!value) return;
        const v = String(value);
        const has = [...selectEl.options].some((o) => o.value === v);
        if (!has) selectEl.add(new Option(v, v));
      }

      function getChartColors() {
        const theme = document.documentElement.getAttribute("data-theme");
        if (theme === "light") {
          return {
            line: "rgb(9, 105, 218)",
            fill: "rgba(9, 105, 218, 0.1)",
            anomalyBand: "rgba(207, 34, 46, 0.12)",
            anomalyPoint: "rgb(207, 34, 46)",
            imputed: "rgba(101, 109, 118, 0.8)",
            grid: "rgba(31, 35, 40, 0.12)",
            ticks: "#656d76",
          };
        }
        return {
          line: "rgb(88, 166, 255)",
          fill: "rgba(88, 166, 255, 0.15)",
          anomalyBand: "rgba(248, 81, 73, 0.15)",
          anomalyPoint: "rgb(248, 81, 73)",
          imputed: "rgba(139, 148, 158, 0.9)",
          grid: "rgba(48, 54, 61, 0.5)",
          ticks: "#8b949e",
        };
      }

      function updateChartColors() {
        if (!chart || !currentChartConfig) return;
        renderChart(
          currentChartConfig.series,
          currentChartConfig.wStart,
          currentChartConfig.wEnd,
        );
      }

      let filterState = {
        search: "",
        indicator: "",
        geography: "",
        yearMin: null,
        yearMax: null,
        classification: "",
      };

      function buildFilterOptions() {
        const indicators = [];
        const geographies = [];
        const classifications = [];
        const seenInd = new Set();
        const seenGeo = new Set();
        const seenClass = new Set();
        for (const it of items) {
          const code = it.indicator_code || "";
          const name = it.indicator_name || code;
          if (code && !seenInd.has(code)) {
            seenInd.add(code);
            indicators.push({ code, name });
          }
          const gCode = it.geography_code || "";
          const gName = it.geography_name || gCode;
          if (gCode && !seenGeo.has(gCode)) {
            seenGeo.add(gCode);
            geographies.push({ code: gCode, name: gName });
          }
          const c = (it.explanation?.classification || "").trim();
          if (c && !seenClass.has(c)) {
            seenClass.add(c);
            classifications.push(c);
          }
        }
        indicators.sort((a, b) => (a.name || a.code).localeCompare(b.name || b.code));
        geographies.sort((a, b) => (a.name || a.code).localeCompare(b.name || b.code));
        classifications.sort();

        const indEl = document.getElementById("filter-indicator");
        const geoEl = document.getElementById("filter-geography");
        const classEl = document.getElementById("filter-classification");
        indEl.innerHTML =
          '<option value="">All indicators</option>' +
          indicators.map((o) => `<option value="${escapeHtml(o.code)}">${escapeHtml(o.name || o.code)}</option>`).join("");
        geoEl.innerHTML =
          '<option value="">All geographies</option>' +
          geographies.map((o) => `<option value="${escapeHtml(o.code)}">${escapeHtml(o.name || o.code)}</option>`).join("");
        classEl.innerHTML =
          '<option value="">All classifications</option>' +
          classifications.map((c) => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
      }

      function matchesSearch(it, q) {
        if (!q || !q.trim()) return true;
        const qq = q.trim().toLowerCase();
        const name = (it.indicator_name || "").toLowerCase();
        const code = (it.indicator_code || "").toLowerCase();
        return name.includes(qq) || code.includes(qq);
      }

      function applyFilters() {
        const search = (document.getElementById("filter-search").value || "").trim();
        const indicator = document.getElementById("filter-indicator").value || "";
        const geography = document.getElementById("filter-geography").value || "";
        const yearMinVal = document.getElementById("filter-year-min").value;
        const yearMaxVal = document.getElementById("filter-year-max").value;
        const yearMin = yearMinVal === "" ? null : parseInt(yearMinVal, 10);
        const yearMax = yearMaxVal === "" ? null : parseInt(yearMaxVal, 10);
        const classification = document.getElementById("filter-classification").value || "";

        filterState = { search, indicator, geography, yearMin, yearMax, classification };

        filteredItems = items.filter((it) => {
          if (search && !matchesSearch(it, search)) return false;
          if (indicator && it.indicator_code !== indicator) return false;
          if (geography && it.geography_code !== geography) return false;
          const wStart = it.window_start;
          const wEnd = it.window_end;
          if (yearMin != null && (wEnd == null || wEnd < yearMin)) return false;
          if (yearMax != null && (wStart == null || wStart > yearMax)) return false;
          if (classification && (it.explanation?.classification || "") !== classification) return false;
          return true;
        });

        const countEl = document.getElementById("results-count");
        countEl.textContent =
          items.length === 0
            ? ""
            : items.length === filteredItems.length
              ? `${items.length} result${items.length !== 1 ? "s" : ""}`
              : `Showing ${filteredItems.length} of ${items.length} results`;
        selectedId = filteredItems.length ? Math.min(selectedId ?? 0, filteredItems.length - 1) : null;
        renderList();
        if (filteredItems.length) {
          selectItem(selectedId);
        } else {
          document.getElementById("chart-title").textContent = "Timeseries";
          document.getElementById("explanation-content").innerHTML = "";
          if (chart) {
            chart.destroy();
            chart = null;
          }
        }
      }

      function clearFilters() {
        document.getElementById("filter-search").value = "";
        document.getElementById("filter-indicator").value = "";
        document.getElementById("filter-geography").value = "";
        document.getElementById("filter-year-min").value = "";
        document.getElementById("filter-year-max").value = "";
        document.getElementById("filter-classification").value = "";
        applyFilters();
      }

      function initFilterListeners() {
        document.getElementById("filter-search").addEventListener("input", () => applyFilters());
        document.getElementById("filter-indicator").addEventListener("change", () => applyFilters());
        document.getElementById("filter-geography").addEventListener("change", () => applyFilters());
        document.getElementById("filter-year-min").addEventListener("input", () => applyFilters());
        document.getElementById("filter-year-max").addEventListener("input", () => applyFilters());
        document.getElementById("filter-classification").addEventListener("change", () => applyFilters());
        document.getElementById("filter-clear").addEventListener("click", () => clearFilters());
      }

      async function loadFeedbackKeys() {
        try {
          const res = await fetch("/api/feedback");
          const list = await res.json();
          feedbackKeys = new Set(
            (list || []).map((e) =>
              [e.indicator_code, e.geography_code, e.window_str].join("\0"),
            ),
          );
        } catch {
          feedbackKeys = new Set();
        }
      }

      function hasFeedback(it) {
        return feedbackKeys.has(
          [it.indicator_code, it.geography_code, it.window_str].join("\0"),
        );
      }

      const SPLIT_CHART_H_KEY = "anomaly-reviewer-chart-pane-px";
      const SPLIT_MIN_CHART = 140;
      const SPLIT_MIN_EXPL = 140;

      function clampChartPaneHeight(px) {
        const ms = document.getElementById("main-split");
        const resizer = document.getElementById("split-resizer");
        if (!ms || !document.getElementById("chart-pane")) return px;
        const rH = resizer ? resizer.offsetHeight : 8;
        const max = Math.max(
          SPLIT_MIN_CHART,
          ms.clientHeight - rH - SPLIT_MIN_EXPL,
        );
        return Math.round(Math.min(Math.max(px, SPLIT_MIN_CHART), max));
      }

      function setChartPaneHeight(px, persist) {
        const ms = document.getElementById("main-split");
        if (!ms) return;
        const h = clampChartPaneHeight(px);
        ms.style.setProperty("--chart-pane-height", `${h}px`);
        if (persist !== false) {
          try {
            localStorage.setItem(SPLIT_CHART_H_KEY, String(h));
          } catch (_) {
            /* ignore */
          }
        }
        if (chart) chart.resize();
      }

      function initSplitPane() {
        const ms = document.getElementById("main-split");
        const resizer = document.getElementById("split-resizer");
        if (!ms || !resizer) return;

        function applyStoredOrDefault() {
          let saved = null;
          try {
            saved = localStorage.getItem(SPLIT_CHART_H_KEY);
          } catch (_) {
            /* ignore */
          }
          if (saved != null && saved !== "") {
            const n = parseInt(saved, 10);
            if (!Number.isNaN(n)) {
              setChartPaneHeight(n, false);
              return;
            }
          }
        }

        requestAnimationFrame(() => {
          applyStoredOrDefault();
          if (chart) chart.resize();
        });

        resizer.addEventListener("mousedown", (e) => {
          e.preventDefault();
          const pane = document.getElementById("chart-pane");
          const startH = pane ? pane.offsetHeight : 400;
          const startY = e.clientY;
          resizer.classList.add("is-dragging");
          document.body.style.cursor = "row-resize";
          document.body.style.userSelect = "none";

          function onMove(ev) {
            const dy = ev.clientY - startY;
            setChartPaneHeight(startH + dy, true);
          }

          function onUp() {
            resizer.classList.remove("is-dragging");
            document.body.style.cursor = "";
            document.body.style.userSelect = "";
            window.removeEventListener("mousemove", onMove);
            window.removeEventListener("mouseup", onUp);
            if (chart) chart.resize();
          }

          window.addEventListener("mousemove", onMove);
          window.addEventListener("mouseup", onUp);
        });

        resizer.addEventListener("touchstart", (e) => {
          if (e.touches.length !== 1) return;
          e.preventDefault();
          const pane = document.getElementById("chart-pane");
          const startH = pane ? pane.offsetHeight : 400;
          const startY = e.touches[0].clientY;
          resizer.classList.add("is-dragging");

          function onTouchMove(ev) {
            if (ev.touches.length !== 1) return;
            const dy = ev.touches[0].clientY - startY;
            setChartPaneHeight(startH + dy, true);
          }

          function onTouchEnd() {
            resizer.classList.remove("is-dragging");
            window.removeEventListener("touchmove", onTouchMove);
            window.removeEventListener("touchend", onTouchEnd);
            window.removeEventListener("touchcancel", onTouchEnd);
            if (chart) chart.resize();
          }

          window.addEventListener("touchmove", onTouchMove, { passive: false });
          window.addEventListener("touchend", onTouchEnd);
          window.addEventListener("touchcancel", onTouchEnd);
        });

        resizer.addEventListener("keydown", (e) => {
          const pane = document.getElementById("chart-pane");
          if (!pane) return;
          const step = e.shiftKey ? 40 : 16;
          if (e.key === "ArrowUp") {
            e.preventDefault();
            setChartPaneHeight(pane.offsetHeight - step, true);
          } else if (e.key === "ArrowDown") {
            e.preventDefault();
            setChartPaneHeight(pane.offsetHeight + step, true);
          }
        });

        let resizeTimer;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            const pane = document.getElementById("chart-pane");
            if (!pane) return;
            setChartPaneHeight(pane.offsetHeight, true);
          }, 120);
        });
      }

      async function load() {
        initFilterListeners();
        const [reviewRes, _] = await Promise.all([
          fetch("/api/review"),
          loadFeedbackKeys(),
        ]);
        const data = await reviewRes.json();
        items = data.items || [];
        buildFilterOptions();
        applyFilters();
        if (filteredItems.length) selectItem(0);
      }

      function renderList() {
        const el = document.getElementById("item-list");
        const list = filteredItems;
        if (!items.length) {
          el.innerHTML =
            '<div class="empty-state"><p>No anomalies loaded.</p><p>Start the app with a review JSON file.</p></div>';
          return;
        }
        if (!list.length) {
          el.innerHTML =
            '<div class="empty-state"><p>No items match the current filters.</p></div>';
          return;
        }
        el.innerHTML = list
          .map(
            (it, i) => `
        <div class="item-card ${selectedId === i ? "active" : ""}" data-id="${i}" onclick="selectItem(${i})">
          <div class="indicator">${escapeHtml(it.indicator_name || it.indicator_code)}${hasFeedback(it) ? ' <span class="badge-reviewed" title="Has feedback">✓</span>' : ""}</div>
          <div class="geo">${escapeHtml(it.geography_name || it.geography_code)}</div>
          <div class="window">${escapeHtml(it.window_str || "")}</div>
          <div class="classification"><span class="badge classification-${escapeHtml((it.explanation?.classification || "").replace(/_/g, "-"))}">${escapeHtml(it.explanation?.classification || "")}</span></div>
        </div>
      `,
          )
          .join("");
      }

      function escapeHtml(s) {
        if (s == null) return "";
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function selectItem(id) {
        selectedId = id;
        renderList();
        const list = filteredItems.length ? filteredItems : items;
        const it = list[id];
        if (!it) return;
        document.getElementById("chart-title").textContent =
          `${it.indicator_name || it.indicator_code} — ${it.geography_name || it.geography_code}`;
        renderChart(it.timeseries || [], it.window_start, it.window_end);
        renderExplanation(it);
      }

      function renderChart(series, wStart, wEnd) {
        const ctx = document.getElementById("chart").getContext("2d");
        if (chart) chart.destroy();
        const periods = series.map((s) => s.period);
        const values = series.map((s) => s.value);
        const isImputed = series.map((s) => s.is_imputed === true);
        const colors = getChartColors();

        const inAnomalyWindow = (i) =>
          wStart != null &&
          wEnd != null &&
          periods[i] >= wStart &&
          periods[i] <= wEnd;
        const pointColors = periods.map((_, i) =>
          isImputed[i]
            ? colors.imputed
            : inAnomalyWindow(i)
              ? colors.anomalyPoint
              : colors.line,
        );
        const pointBackgroundColors = periods.map((_, i) =>
          isImputed[i] ? "transparent" : pointColors[i],
        );
        const pointRadii = periods.map((_, i) => (inAnomalyWindow(i) ? 6 : 4));
        const pointHoverRadii = periods.map((_, i) =>
          inAnomalyWindow(i) ? 8 : 6,
        );

        let xMin = -1,
          xMax = -1;
        if (wStart != null && wEnd != null && periods.length) {
          const idxStart = periods.findIndex((p) => p >= wStart);
          const idxEnd = periods.findIndex((p) => p >= wEnd);
          xMin = idxStart >= 0 ? idxStart - 0.4 : 0;
          xMax = idxEnd >= 0 ? idxEnd + 0.4 : periods.length - 0.6;
        }
        const annotation =
          xMin >= 0 && xMax > xMin
            ? {
                anomalyBox: {
                  type: "box",
                  xMin,
                  xMax,
                  yMin: "min",
                  yMax: "max",
                  backgroundColor: colors.anomalyBand,
                  borderColor: "transparent",
                  borderWidth: 0,
                },
              }
            : {};

        currentChartConfig = { series, wStart, wEnd };
        chart = new Chart(ctx, {
          type: "line",
          data: {
            labels: periods,
            datasets: [
              {
                label: "Value",
                data: values,
                borderColor: colors.line,
                backgroundColor: colors.fill,
                fill: true,
                tension: 0.25,
                pointRadius: pointRadii,
                pointHoverRadius: pointHoverRadii,
                pointBackgroundColor: pointBackgroundColors,
                pointBorderColor: pointColors,
                pointBorderWidth: 2,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { intersect: false, mode: "index" },
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  afterBody: (items) => {
                    const i = items[0]?.dataIndex;
                    const lines = [];
                    if (
                      i != null &&
                      wStart != null &&
                      wEnd != null &&
                      periods[i] >= wStart &&
                      periods[i] <= wEnd
                    )
                      lines.push("Anomaly window");
                    if (i != null && isImputed[i]) lines.push("Imputed");
                    return lines.length ? ["\n" + lines.join(" · ")] : [];
                  },
                },
              },
              annotation: { annotations: annotation },
            },
            scales: {
              x: {
                type: "category",
                grid: { color: colors.grid },
                ticks: { color: colors.ticks, maxRotation: 45 },
              },
              y: {
                grid: { color: colors.grid },
                ticks: { color: colors.ticks },
              },
            },
          },
        });
      }

      function renderExplanation(it) {
        const ex = it.explanation || {};
        const el = document.getElementById("explanation-content");
        const explainers = ex.explainers || [];
        const hasMultiple = explainers.length > 1;

        if (hasMultiple) {
          const agreement = ex.agreement || "disagree";
          const summaryHtml = `
            <div class="${agreement === "agree" ? "summary-agree" : "summary-disagree"}">
              ${agreement === "agree"
                ? "✓ Explainers agree: " + escapeHtml(ex.classification || "")
                : "⚠ Explainers disagree — review each tab"}
            </div>
            <div class="summary-compare">
              ${explainers.map((exp) => `
                <div class="explainer-row">
                  <span class="name">${escapeHtml(exp.name)}</span>
                  <span>
                    <span class="badge classification-${escapeHtml((exp.classification || "").replace(/_/g, "-"))}">${escapeHtml(exp.classification || "")}</span>
                    — ${escapeHtml((exp.explanation || "").slice(0, 120))}${(exp.explanation || "").length > 120 ? "…" : ""}
                  </span>
                </div>
              `).join("")}
            </div>
          `;
          const panelHtmls = [
            summaryHtml,
            ...explainers.map((exp) => `
              <div class="explanation-text">${escapeHtml(exp.explanation || "No explanation.")}</div>
              ${(exp.evidence_sources || []).length ? `
                <div class="evidence-list">
                  <strong>Evidence</strong>
                  <ul>${(exp.evidence_sources || []).map((ev) =>
                    `<li>${escapeHtml(typeof ev === "object" ? [ev.name, ev.date_range, ev.source_type].filter(Boolean).join(" — ") : String(ev))}</li>`
                  ).join("")}</ul>
                </div>
              ` : ""}
              <div class="meta" style="margin-top: 1rem;">
                <span class="badge classification-${escapeHtml((exp.classification || "").replace(/_/g, "-"))}">${escapeHtml(exp.classification || "")}</span>
                <span>Confidence: ${exp.confidence != null ? (exp.confidence * 100).toFixed(0) : "-"}%</span>
              </div>
            `),
          ];
          const tabLabels = ["Summary", ...explainers.map((e) => e.name)];
          el.innerHTML = `
            <div class="explanation-tabs">
              ${tabLabels.map((label, i) =>
                `<button class="tab-btn ${i === 0 ? "active" : ""}" data-tab="${i}">${escapeHtml(label)}</button>`
              ).join("")}
            </div>
            ${panelHtmls.map((html, i) =>
              `<div class="tab-panel ${i === 0 ? "active" : ""}" data-panel="${i}">${html}</div>`
            ).join("")}
          `;
          el.querySelectorAll(".tab-btn").forEach((btn) => {
            btn.addEventListener("click", () => {
              const tab = parseInt(btn.dataset.tab, 10);
              el.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
              el.querySelectorAll(".tab-panel").forEach((p) => p.classList.remove("active"));
              btn.classList.add("active");
              el.querySelector(`.tab-panel[data-panel="${tab}"]`)?.classList.add("active");
              if (facetExplainerNames.length) {
                if (tab === 0) setActiveExplainerForFacets(null);
                else setActiveExplainerForFacets(facetExplainerNames[tab - 1]);
              }
            });
          });
        } else if (explainers.length === 1) {
          const exp = explainers[0];
          el.innerHTML = `
            <div class="explanation-text">${escapeHtml(exp.explanation || "No explanation available.")}</div>
            ${(exp.evidence_sources || []).length ? `
              <div class="evidence-list">
                <strong>Evidence</strong>
                <ul>${(exp.evidence_sources || []).map((ev) =>
                  `<li>${escapeHtml(typeof ev === "object" ? [ev.name, ev.date_range, ev.source_type].filter(Boolean).join(" — ") : String(ev))}</li>`
                ).join("")}</ul>
              </div>
            ` : ""}
            <div class="meta">
              <span class="badge classification-${escapeHtml((exp.classification || "").replace(/_/g, "-"))}">${escapeHtml(exp.classification || "")}</span>
              <span>Confidence: ${exp.confidence != null ? (exp.confidence * 100).toFixed(0) : "-"}%</span>
              <span>Source: ${escapeHtml(exp.name || ex.source || "")}</span>
            </div>
          `;
        } else {
          el.innerHTML = `
            <div class="explanation-text">${escapeHtml(ex.explanation || "No explanation available.")}</div>
            <div class="meta">
              <span class="badge classification-${escapeHtml((ex.classification || "").replace(/_/g, "-"))}">${escapeHtml(ex.classification || "")}</span>
              <span>Confidence: ${ex.confidence != null ? (ex.confidence * 100).toFixed(0) : "-"}%</span>
              <span>Evidence: ${escapeHtml(ex.evidence_strength || "")}</span>
              <span>Source: ${escapeHtml(ex.source || "")}</span>
            </div>
          `;
        }
        document.getElementById("feedback-comment").value = "";
        document.getElementById("feedback-suggested-classification").value = "";
        document.getElementById("feedback-status").textContent = "";
        buildFacetTable(it);
        loadExistingFeedback(it);
      }

      async function loadExistingFeedback(it) {
        document.querySelectorAll(".feedback-buttons .btn").forEach((b) =>
          b.classList.remove("btn-active"),
        );
        if (!it?.indicator_code || !it?.geography_code || it?.window_str == null) return;
        try {
          const params = new URLSearchParams({
            indicator_code: it.indicator_code,
            geography_code: it.geography_code,
            window_str: String(it.window_str || ""),
          });
          const res = await fetch("/api/feedback/item?" + params);
          const fb = await res.json();
          if (fb && fb.verdict) {
            document.getElementById("feedback-comment").value = fb.comment || "";
            document.getElementById("feedback-suggested-classification").value =
              fb.suggested_classification || "";
            const facets = fb.facets || {};
            document.querySelectorAll(".facet-select").forEach((sel) => {
              const f = sel.dataset.facet;
              const ex = sel.dataset.explainer;
              const val = facets[f]?.[ex];
              if (val) sel.value = val;
            });
            const ref = document.getElementById("reference-explainer");
            const best = document.getElementById("best-explainer");
            if (fb.reference_explainer) {
              ensureOption(ref, fb.reference_explainer);
              ref.value = fb.reference_explainer;
            }
            if (fb.best_explainer) {
              ensureOption(best, fb.best_explainer);
              best.value = fb.best_explainer;
            }
            let statusExtra = fb.verdict;
            if (fb.reference_explainer) statusExtra += ` · ref: ${fb.reference_explainer}`;
            document.getElementById("feedback-status").textContent =
              "Previous: " + statusExtra + (fb.comment ? " — " + fb.comment : "");
            document.getElementById("feedback-status").style.color = "var(--text-muted)";
            document.querySelectorAll(".feedback-buttons .btn").forEach((btn) => {
              if (btn.dataset.verdict === fb.verdict) btn.classList.add("btn-active");
            });
          }
        } catch {
          /* ignore */
        }
      }

      async function submitVerdict(verdict) {
        const it = getSelectedItem();
        if (!it) return;
        const comment =
          document.getElementById("feedback-comment").value.trim() || null;
        const suggested =
          document.getElementById("feedback-suggested-classification").value.trim() ||
          null;
        const refEl = document.getElementById("reference-explainer");
        const bestEl = document.getElementById("best-explainer");
        try {
          const res = await fetch("/api/feedback", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              item_id: selectedId,
              indicator_code: it.indicator_code,
              geography_code: it.geography_code,
              window_str: it.window_str,
              verdict,
              comment,
              suggested_classification: suggested,
              facets: collectFacetsFromDOM(),
              reference_explainer: refEl.value || null,
              best_explainer: bestEl.value || null,
              overall_basis: "explicit",
            }),
          });
          await res.json();
          document.getElementById("feedback-status").textContent =
            `Feedback saved: ${verdict}`;
          document.getElementById("feedback-status").style.color = "var(--success)";
          document.querySelectorAll(".feedback-buttons .btn").forEach((btn) => {
            btn.classList.toggle("btn-active", btn.dataset.verdict === verdict);
          });
          feedbackKeys.add(
            [it.indicator_code, it.geography_code, it.window_str].join("\0"),
          );
          renderList();
        } catch (e) {
          document.getElementById("feedback-status").textContent =
            "Error: " + e.message;
          document.getElementById("feedback-status").style.color =
            "var(--danger)";
        }
      }

      function getSelectedItem() {
        const list = filteredItems.length ? filteredItems : items;
        if (selectedId == null || selectedId < 0 || selectedId >= list.length) return null;
        return list[selectedId];
      }

      initSplitPane();
      load();
    </script>
  </body>
</html>
