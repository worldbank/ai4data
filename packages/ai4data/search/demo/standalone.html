<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@ai4data/search — standalone (from npm)</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        max-width: 42rem;
        margin: 0 auto;
        padding: 1.5rem;
      }
      label {
        display: block;
        margin-top: 1rem;
        font-weight: 600;
      }
      input[type="url"],
      input[type="text"] {
        width: 100%;
        padding: 0.5rem;
        margin-top: 0.25rem;
      }
      button {
        margin-top: 0.5rem;
        padding: 0.5rem 1rem;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #status {
        margin: 1rem 0;
        padding: 0.75rem;
        background: #f0f0f0;
        border-radius: 4px;
        font-size: 0.9rem;
      }
      #results {
        list-style: none;
        padding: 0;
        margin: 1rem 0 0;
      }
      #results li {
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        background: #f8f8f8;
        border-radius: 4px;
        border-left: 3px solid #0066cc;
      }
      #results li strong {
        display: block;
        margin-bottom: 0.25rem;
      }
      #results li small {
        color: #666;
      }
      .search-row {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }
      .search-row input {
        flex: 1;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "@ai4data/search": "https://esm.sh/@ai4data/search@0.1.3",
          "@ai4data/search/worker": "https://esm.sh/@ai4data/search@0.1.3/worker"
        }
      }
    </script>
  </head>
  <body>
    <h1>@ai4data/search (from npm)</h1>
    <p>
      This page loads the package from <a href="https://esm.sh">esm.sh</a>. No
      build step. Serve this file over HTTP (e.g. <code>npx serve .</code> or
      any static server) then open <code>/demo/standalone.html</code> — loading
      as <code>file://</code> may be blocked by CORS.
    </p>

    <label for="manifestUrl">Manifest URL</label>
    <input
      type="url"
      id="manifestUrl"
      placeholder="https://example.com/data/collection/manifest.json"
    />

    <button id="connectBtn">Connect</button>
    <div id="status">Enter a manifest URL and click Connect.</div>

    <label for="query">Search</label>
    <div class="search-row">
      <input
        type="text"
        id="query"
        placeholder="e.g. climate finance"
        disabled
      />
      <button id="searchBtn" disabled>Search</button>
    </div>

    <ul id="results"></ul>

    <script type="module">
      import { SearchClient } from "@ai4data/search";

      const WORKER_URL = "https://esm.sh/@ai4data/search@0.1.3/worker";

      const manifestInput = document.getElementById("manifestUrl");
      const connectBtn = document.getElementById("connectBtn");
      const statusEl = document.getElementById("status");
      const queryInput = document.getElementById("query");
      const searchBtn = document.getElementById("searchBtn");
      const resultsList = document.getElementById("results");

      let client = null;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function setResults(items) {
        resultsList.innerHTML = (items || [])
          .map(
            (r) =>
              `<li><strong>${escapeHtml(r.title || String(r.id))}</strong><br><small>id: ${r.id} · score: ${(r.score ?? 0).toFixed(4)}</small></li>`,
          )
          .join("");
      }

      function escapeHtml(s) {
        const div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      function updateUI() {
        if (!client) return;
        setStatus(client.loadingMessage);
        const ready = client.isIndexReady;
        queryInput.disabled = !ready;
        searchBtn.disabled = !ready;
        if (ready)
          setStatus(
            client.isModelReady
              ? "Ready (semantic + hybrid)"
              : "Index ready (lexical only)",
          );
      }

      connectBtn.addEventListener("click", async () => {
        const url = manifestInput.value.trim();
        if (!url) {
          setStatus("Please enter a manifest URL.");
          return;
        }
        if (client) {
          client.destroy();
          client = null;
        }
        setStatus("Connecting…");
        setResults([]);
        queryInput.value = "";
        connectBtn.disabled = true;
        try {
          client = await SearchClient.fromCDN(url, { workerUrl: WORKER_URL });
          client.on("progress", updateUI);
          client.on("index_ready", updateUI);
          client.on("ready", updateUI);
          client.on("error", updateUI);
          client.on("results", ({ data }) => {
            setResults(data);
            updateUI();
          });
          const interval = setInterval(() => {
            updateUI();
            if (client?.isIndexReady) clearInterval(interval);
          }, 500);
          setTimeout(() => clearInterval(interval), 120000);
        } catch (err) {
          setStatus(`Error: ${err.message}`);
        }
        connectBtn.disabled = false;
      });

      searchBtn.addEventListener("click", () => {
        const q = queryInput.value.trim();
        if (!q || !client) return;
        client.search(q, { topK: 10, mode: "hybrid" });
        setStatus("Searching…");
      });
      queryInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") searchBtn.click();
      });
    </script>
  </body>
</html>
